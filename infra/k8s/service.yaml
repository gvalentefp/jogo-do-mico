apiVersion: v1
kind: Service
metadata:
  name: mico-server
  namespace: mico
  labels:
    app.kubernetes.io/name: mico-server
spec:
  type: ClusterIP
  # Pin a client to one pod so a WebSocket session stays on its room's pod.
  sessionAffinity: ClientIP
  selector:
    app.kubernetes.io/name: mico-server
  ports:
    - name: ws
      port: 80
      targetPort: ws
      protocol: TCP
