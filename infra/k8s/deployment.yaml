apiVersion: apps/v1
kind: Deployment
metadata:
  name: mico-server
  namespace: mico
  labels:
    app.kubernetes.io/name: mico-server
    app.kubernetes.io/part-of: jogo-do-mico
spec:
  # Rooms are in-memory per pod; keep at 1 until a shared store exists.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mico-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mico-server
    spec:
      containers:
        - name: server
          image: mico-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: ws
              containerPort: 8787
          env:
            - name: PORT
              value: "8787"
            - name: HOST
              value: "0.0.0.0"
            - name: MAX_PLAYERS
              value: "8"
          readinessProbe:
            httpGet:
              path: /healthz
              port: ws
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: ws
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
