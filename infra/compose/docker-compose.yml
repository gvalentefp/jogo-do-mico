# Local development / single-host deployment.
#   docker compose -f infra/compose/docker-compose.yml up --build
# Build context is the repo root so the Dockerfile can see the whole workspace.
services:
  server:
    build:
      context: ../..
      dockerfile: infra/docker/server.Dockerfile
    image: mico-server:latest
    environment:
      PORT: "8787"
      HOST: "0.0.0.0"
      MAX_PLAYERS: "8"
    ports:
      - "8787:8787"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - mico

networks:
  mico:
    driver: bridge
